sugarcube-2:
  macros:
    video:
      name: video
      description: "Renders a <video> element whose src is resolved against
        setup.ImagePath. First arg is the path (required, e.g. 'tentacles/2.0.mp4');
        .webm picks type=video/webm, otherwise video/mp4. Optional second arg:
        a class-name string, or an options object with any of
        { class, id, width, style, type, autoplay, controls, muted, loop }.
        autoplay/controls/muted/loop default to true; pass false to disable."
    image:
      name: image
      description: "Renders an <img> element whose src is resolved against
        setup.ImagePath. First arg is the path (required, e.g. 'img/corruption.png').
        Optional second arg: a class-name string, or an options object with any
        of { class, id, width, height, style, alt, onclick }."
    updatemeter:
      name: updatemeter
      description: "Updates a named meter's value without re-rendering it. If the
        meter is currently on the page it updates in place with animation. Args:
        meterName (string), value (number, 0-1)."
    eventRandomizer:
      name: eventRandomizer
      description: "Triggers a ghost interaction event for the given body-part key.
        Args: eventKey (string, one of 'brain', 'tits', 'ass', 'bottom',
        'mouth', 'pussy', 'anal'). Sets $argForRandomizer to the key and
        _eventTriggered to true. Selects a video based on current clothing state
        and active haunted house."
    eventRandomizerText:
      name: eventRandomizerText
      description: "Displays the text and stat changes for the current ghost
        interaction event. Args: eventKey (string, one of 'brain', 'tits',
        'ass', 'bottom', 'mouth', 'pussy', 'anal'). Uses the key to determine
        which body-part dialogue and effects to show."
    companionHelpOption:
      name: companionHelpOption
      description: Renders the companion help button for ghost events. Shows a
        scene-replace link for Brook/Alice/Blake if aroused, or a simple passage
        link for other companions. No args.
    companionExp:
      name: companionExp
      description: "Adds experience points to the active companion ($companion).
        Checks $companion.name and applies the given amount to the matching
        companion object (e.g. $brook.exp). Does nothing if the companion is
        already at max level (5). Args: amount (number)."
    companionLinks:
      name: companionLinks
      description: Renders the active companion's portrait as a clickable link to
        their main hub passage. Uses $companion.name to select the correct image
        and passage.
    companionLinksSuccess:
      name: companionLinksSuccess
      description: Renders the active companion's portrait as a link to the
        'CompanionSucceeded' passage. Uses $companion.name to select the correct
        image.
    companionTextEvent1:
      name: companionTextEvent1
      description: Displays companion-specific dialogue and applies stat changes for
        ghost encounter event type 1. Adjusts $companion.sanity and
        $companion.lust. Handles trans-companion transformation stage 1 for
        Alex/Taylor/Casey.
    companionTextEvent2:
      name: companionTextEvent2
      description: Displays companion-specific dialogue and applies stat changes for
        ghost encounter event type 2. Adjusts $companion.sanity and
        $companion.lust, and grants +15 MC lust. Handles trans-companion
        transformation for Alex/Taylor/Casey.
    companionTextEvent3:
      name: companionTextEvent3
      description: Displays companion-specific dialogue and applies stat changes for
        ghost encounter event type 3. Adjusts $companion.sanity and
        $companion.lust, and grants +15 MC lust. Handles trans-companion
        transformation for Alex/Taylor/Casey.
    companionTextEvent4:
      name: companionTextEvent4
      description: Displays companion-specific dialogue and applies stat changes for
        ghost encounter event type 4. Adjusts $companion.sanity and
        $companion.lust, and grants +15 MC lust. Handles trans-companion
        transformation for Alex/Taylor/Casey.
    isCompanionContinue:
      name: isCompanionContinue
      description: 'Renders a linkappend asking whether the companion can continue the
        hunt. Evaluates companion level and sanity against the given thresholds.
        On success may trigger <<include "CompanionResult">> and calls <<companionExp 2>>.
        Args: companionLevel (number), levelThreshold (number), sanityMin
        (number), sanityMax (number).'
    aliceLustHighEvent:
      name: aliceLustHighEvent
      description: "Renders an extra action button shown when Alice's lust is high
        enough. The button reduces $companion.sanity by 3 and replaces
        #eventVideo with <<include \"AliceHelp\">>."
    includeTimeEventClothesHunt:
      name: includeTimeEventClothesHunt
      description: Advances time by 1 hour, runs the event check, then attempts a
        clothes-steal event. Falls through to CheckHuntStart if no event fires.
        Does nothing during an active cursed hunt ($cursedHuntActive eq 1).
    includeTimeEventHunt:
      name: includeTimeEventHunt
      description: Advances time by 1 hour, runs the event check, then falls through
        to CheckHuntStart if no event fires. Does nothing during an active
        cursed hunt ($cursedHuntActive eq 1).
    includeStyle:
      name: includeStyle
      description: Injects CSS background-image for the current room based on
        previous() and the room's $*.background variable. Covers all rooms in
        the Owaissa and Elm Street haunted houses.
    includeStyle2:
      name: includeStyle2
      description: Extended version of <<includeStyle>> covering additional rooms and
        background variants. Injects CSS for the current room based on passage
        context and background variables.
    includeStyleEventMC:
      name: includeStyleEventMC
      description: "Applies a CSS filter (brightness/contrast/grayscale) to the
        #eventVideo element, used during MC-focused events to create a stylised
        visual effect."
    cthulionAbility:
      name: cthulionAbility
      description: "Sets _videoList to the video pool for a specific Cthulion ghost
        ability tier (1-4). Used before rendering the event video for
        Cthulion-specific scenes. Args: tier (number, 1-4)."
    seduceGhostMinigameVideo:
      name: seduceGhostMinigameVideo
      description: Renders the media (image or video) for the current seduce-ghost
        minigame state. Delegates video-list lookup to
        setup.SeduceGhostMinigame.getVideoList().
    seduceGhostMinigameMenu:
      name: seduceGhostMinigameMenu
      description: Renders the interactive action buttons for the seduce-ghost
        minigame. Button choices depend on $minigameVideo state and current
        stats. Action logic is delegated to setup.SeduceGhostMinigame.
    seduceGhostMinigameText:
      name: seduceGhostMinigameText
      description: Renders the dialogue and stat feedback text for the current
        seduce-ghost minigame state.
    ghostRoom:
      name: ghostRoom
      description: Prints the human-readable display name of the ghost's current
        favourite room. Maps $ghostRoom.name internal keys (e.g. "bedroomTwo")
        to display strings.
    monkeyPawWish:
      name: monkeyPawWish
      description: "Dispatcher that wikifies the given wish-effect widget by
        name. Used by MonkeyPaw.tw to iterate setup.MonkeyPawWishes without
        an if/elseif chain. Args: widgetName (string, one of 'activity',
        'trapTheGhost', 'sanity', 'leave', 'knowledge', 'dawn')."
    activity:
      name: activity
      description: "Monkey Paw wish: replaces .MonkeyPawShow with a random
        cursed-possessions video. Costs 1 wish, decreases sanity by 15, and
        increases MC lust by 15."
    trapTheGhost:
      name: trapTheGhost
      description: "Monkey Paw wish: spends 1 wish and sets $ghostIsTrapped to 1,
        preventing the ghost from changing its favourite room. Decreases sanity
        by 15."
    sanity:
      name: sanity
      description: "Monkey Paw wish: spends 1 wish and resets $mc.sanity to 50,
        updating the sanity meter display."
    leave:
      name: leave
      description: "Monkey Paw wish: spends 1 wish, ends the cursed hunt
        ($cursedHuntActive to 0), and sends the player back to the haunted house
        street passage (Elm Street or Owaissa Street)."
    knowledge:
      name: knowledge
      description: 'Monkey Paw wish: spends 1 wish (once per hunt via $knowledgeUsed)
        to eliminate a random non-ghost evidence from the diary. After a
        2-second delay, triggers a ghost hunt event via <<goto
        "GhostHuntEvent">>.'
    dawn:
      name: dawn
      description: "Monkey Paw wish: spends 1 wish, skips time to 6:00 AM ($hours to
        6), ends the cursed hunt, and goes to the HuntOverTime passage."
    anything:
      name: anything
      description: "Monkey Paw wish: rolls a random number (1-6) into _check. The
        result is used by the calling passage to determine a random outcome."
    tarotPassion:
      name: tarotPassion
      description: "Tarot effect widget dispatched by TarotCards when the passion
        card is drawn: random passion video, +15 lust, -15 sanity."
    tarotPulse:
      name: tarotPulse
      description: "Tarot effect widget dispatched by TarotCards when the pulse card
        is drawn: random pulse video, -15 lust, +15 sanity."
    tarotOblivion:
      name: tarotOblivion
      description: "Tarot effect widget for the oblivion card: routes the player to
        HuntOverSanity after a 2s delay."
    tarotKnowledge:
      name: tarotKnowledge
      description: "Tarot effect widget for the knowledge card: once per hunt,
        removes a random evidence type that isn't already checked or hidden."
    tarotPower:
      name: tarotPower
      description: "Tarot effect widget for the power card: random power video,
        +5 energy, +1 fit."
    tarotWhore:
      name: tarotWhore
      description: "Tarot effect widget for the whore card: random whore video,
        +0.3 corruption."
    tarotDeath:
      name: tarotDeath
      description: "Tarot effect widget for the death card: triggers the cursed hunt
        flow or, if already opted out, jumps to GhostHuntEvent."
    tarotPossession:
      name: tarotPossession
      description: "Tarot effect widget for the possession card: sets hunt mode to
        POSSESSED, rolls $hours, routes to CityMapPossessed."
    tarotHighpriestess:
      name: tarotHighpriestess
      description: "Tarot effect widget for the high priestess card: sets
        $highpriestess to 1."
    huntEndExit:
      name: huntEndExit
      description: "Shared exit link for HuntEnd hunt-ending scenes. Renders a
        .usebtn link whose destination forks on $highpriestess: when set, the
        tarot burns itself (clears the flag, restores sanity to 25) and routes
        back to $return; otherwise, the link routes to Sleep. Args: linkText
        (string) -- e.g. 'fading into darkness', 'plunging you into
        darkness', 'nothing'."
    webcamEvent:
      name: webcamEvent
      description: Runs the webcam show for the current $webcamEvent type ("tease",
        "masturbate", "toypussy", "toyanal", "fingeranal"). Grants +60 lust and
        money, +0.2 corruption (if below 10), and sets $webcamShowCD to 1.
    showmeter:
      name: showmeter
      description: 'Renders a named meter to the page at the current location.
        Optionally sets its value at the same time. The element receives the id
        "meter-<slugified-name>". Args: meterName (string), [value (number,
        0-1)].'
    hovertip:
      name: hovertip
      container: true
      description: "Container macro that wraps its contents with a tooltip. On hover
        or focus, shows the tooltip text above the element, repositioned
        automatically to stay on-screen. Args: tooltipText (string), [maxWidth
        (number, px)]."
    newmeter:
      name: newmeter
      container: true
      description: "Defines a new named meter. Must be called in StoryInit. Supports
        child tags: <<colors>>, <<sizing>>, <<animation>>, <<label>>. Args:
        meterName (string), [startingValue (number, 0-1)]."
    sizing:
      name: sizing
      description: "Child tag of <<newmeter>>. Sets the meter's dimensions. Args:
        width (CSS value), [height (CSS value)]."
    colors:
      name: colors
      description: "Child tag of <<newmeter>>. Sets the meter's fill, empty, and
        background colors. With 1 arg sets a solid color; with 2 sets
        full+empty; with 3 sets full+empty+backing. Args: full (color), [empty
        (color)], [backing (color)]."
    label:
      name: label
      description: "Child tag of <<newmeter>>. Adds a text label to the meter. Args:
        labelText (string), [textColor (CSS color)], [alignment (string)]."
    animation:
      name: animation
      description: 'Child tag of <<newmeter>>. Configures the fill animation. Pass
        false to disable or a CSS time value (e.g. "0.4s") to set duration.
        Args: timeOrBool (CSS time string | false), [easing ("swing" |
        "linear")].'
    roomShell:
      name: roomShell
      container: true
      description: "Container widget that wraps a haunted-house room with the standard
        .room/.room-wrapper/.content/.action scaffolding. Sets shared _shell*
        temp vars consumed by the inner <<roomFooter>> widget. Args: passage
        (string, e.g. 'ElmBedroom' or 'IroncladHallway'), bgRoomVar (string, the
        room state variable whose .background is toggled, e.g. 'bedroom' or
        'BlockACellA'), [variant (string, 'basic' for enigma's simple light + no
        companion; default = full)]. Inner content should be an optional
        <<furnitureRow>> followed by a <<roomFooter>>."
    furnitureRow:
      name: furnitureRow
      container: true
      description: Container widget that wraps its contents in <div
        class="furnitureSearch">. Use inside <<roomShell>> for the small set of
        <<furnitureItem>>/<<hideSpot>> calls a room exposes; omit entirely for
        rooms with no furniture.
    roomFooter:
      name: roomFooter
      container: true
      description: "Container widget that emits the .footer block for a haunted-house
        room: a .footertools div with <<roomToolBar>> + the appropriate light
        widget, plus a .footeraction div whose body comes from the inner content
        (the per-room navigation links). Reads the _shell* temp vars set by the
        enclosing <<roomShell>> for passage, bgRoomVar, and variant. Prepends a
        <<huntConditions>> HUD above the footer."
    huntConditions:
      name: huntConditions
      description: "Renders the hunt HUD row above the tool bar showing the live
        per-step deltas for sanity, lust, corruption (and whether time is
        advancing), plus a coloured badge for every active contributor
        (darkness, clothing state, lust-as-fuel, risky tools, bait). Reads
        setup.HauntConditions.snapshot(). No args."
    huntActionBar:
      name: huntActionBar
      description: "Renders the spendable-resource buttons surfaced during a hunt:
        bait the ghost (lust spend), toggle risky tools on/off. Only renders
        when a hunt is active (setup.HauntedHouses.isInsideHouse()). No args."
    navLink:
      name: navLink
      description: "Renders an @@.adaptiveLink;<<link>>...<</link>>@@ navigation link
        that fires the appropriate include-time-event chain and increments
        $stepCount. Args: label (string), targetPassage (string), [mode (string,
        'hunt' for ironclad's includeTimeEventHunt; default = elm/owaissa
        includeTimeEventClothesHunt)]."
    leaveLink:
      name: leaveLink
      description: "Wraps a plain @@.adaptiveLink;<<link>> in the
        .cursedHuntLinkDisable span used by the elm and owaissa hallways'
        leave/Outside exits. No event chain or step increment. Args: label
        (string), targetPassage (string)."
    roomToolCard:
      name: roomToolCard
      description: "Renders one tool slot inside <<roomToolBar>>. Derives the image,
        picture id, and searchTool config from setup.searchToolDefs and
        setup.searchPrefixIndex. Args: tool (string, key into searchToolDefs),
        prefix (string, room prefix from searchRoomPrefixes)."
    roomToolBar:
      name: roomToolBar
      description: "Emits the canonical six tool slots (EMF, Ectoplasm, GWB,
        Spiritbox, Thermometer, UVL) for one haunted-house room, plus the
        companion card. Args: prefix (string, room prefix from
        searchRoomPrefixes), [noCompanion (string, pass 'noCompanion' to
        suppress the companion card — used by enigma rooms)]."
    roomFooterLight:
      name: roomFooterLight
      description: "Renders the lights-on/off + heart minigame block for elm, owaissa,
        and ironclad rooms (cursedHuntLinkDisable wrapper, plus the seduction
        minigame trigger when $mc.lust gte 80). Args: passage (string, link
        target — usually the current passage name), bgRoomVar (string, name of
        the room state variable whose .background is toggled, e.g. 'bedroom' or
        'BlockACellA')."
    roomFooterLightBasic:
      name: roomFooterLightBasic
      description: "Enigma's simpler lights-only footer block: no
        cursedHuntLinkDisable wrapper, no minigame trigger. Args: passage
        (string), bgRoomVar (string)."
    hideSpot:
      name: hideSpot
      description: "Furniture item that doubles as a hide spot during cursed hunts.
        When $cursedHuntActive is 1 the image highlights and clicking replaces
        the room with the hide-spot scene; otherwise it acts as a normal
        furniture span. Args: passage (string, link target), imageFile (string,
        filename under img/furniture/), id (string, span id, e.g.
        'bedroom_bed1')."
    furnitureItem:
      name: furnitureItem
      description: "Plain furniture span that opens furnitureSearch on click. Args:
        imageFile (string, filename under img/furniture/), id (string, span id
        and $currentFurniture value, e.g. 'bedroom_table')."
    companionCard:
      name: companionCard
    huntHouseCard:
      name: huntHouseCard
      description: "Renders one .housecard tile on GhostStreet using the
        setup.HauntedHouses catalogue. Handles the level gate, the street-passage
        link, and the per-click contract/flag/furniture/room side effects. Args:
        houseId (string, 'owaissa' | 'elm' | 'enigma' | 'ironclad')."
    huntHouseStreet:
      name: huntHouseStreet
      container: true
      description: "Shared body for the per-house street passages (Owaissa, Elm,
        Enigma, Ironclad): header image, location/description, optional
        companion talk branch, default Go-inside link (overridable by passing
        inner content, as Ironclad does for the wardenClothesStage gate), and
        the End-the-hunt link while inside a hunt. Args: houseId (string),
        locationLabel (string, e.g. 'Owaissa Street'), description (string,
        mc-thoughts body)."
    companionStreetTalk:
      name: companionStreetTalk
      description: "Renders the '@@.usebtn; [[Talk to her/him|<Name>Main]]' link
        block used by the per-house street passages when the player's companion
        is standing outside. Pulls the Main passage and pronoun from
        setup.Companion."
    randRangeImg:
      name: randRangeImg
      description: "Renders a random image from a numbered sequence. Path is
        setup.ImagePath + '/' + pathPrefix + N + ext, where N is chosen
        uniformly from [start..end]. Args: pathPrefix (string), start (int), end
        (int), ext (string, e.g. '.jpg'), [cssClass (string, default
        'evidenceImgs')]."
    randRangeVideo:
      name: randRangeVideo
      description: "Video counterpart of <<randRangeImg>>. Renders one random video
        from a numbered sequence inside an autoplay/muted/loop shell. Args:
        pathPrefix (string), start (int), end (int), ext (string)."
    notFound:
      name: notFound
      description: "Canonical 'I didn't find anything' block used by the
        evidence-check tool passages. Args: message (string), [retryPassage
        (string; when passed and the player can afford 5 sanity, surfaces a
        Press through (−5 sanity) link that re-runs that check passage)]."
    coloredText:
      name: coloredText
      description: "Wraps content in the evidence bold/stroke text span. Args: color
        (string — pass '' for no colour), content (any)."
    randomVideo:
      name: randomVideo
    gainXP:
      name: gainXP
    companionMini:
      name: companionMini
    companionExpGain:
      name: companionExpGain
    sanityPills:
      name: sanityPills
    deliveryEventChoose:
      name: deliveryEventChoose
      container: true
      description: "Container widget for a delivery encounter's gate passage. Handles
        init-if-ndef, the header image, earnedMoney accounting (config-driven),
        and the shared 'already delivered → thank you → back' branch. The
        per-encounter dialog goes in the body and is only rendered when the
        encounter hasn't been completed. Args: type (string, key into
        setup.deliveryEventChooseConfig)."
    deliveryVideo:
      name: deliveryVideo
      description: "Renders one random video from /deliveryhub/<subdir>/N.mp4 inside
        an autoplay/muted/loop shell. Args: subdir (string), start (int), [end
        (int, default=start)]."
    deliveryThanks:
      name: deliveryThanks
      description: Emits a randomised 'thank you' one-liner for a successful delivery.
        No args.
    deliverySorry:
      name: deliverySorry
      description: Emits a randomised 'wrong delivery' one-liner. No args.
    deliveryBonus:
      name: deliveryBonus
      description: "Emits the shared 'You earned an extra $N' block that awards bonus
        money and capped corruption. Args: amount (number), [corruption (number,
        default 0.2)]."
    deliveryLustOverflow:
      name: deliveryLustOverflow
      description: Resets $mc.lust to 0 and repaints the lust meter if lust has
        overflowed 100. No args.
    deliveryCorrReq:
      name: deliveryCorrReq
      description: "Emits the shared '(Req. corruption ≥ N)' warning line. Args:
        threshold (number)."
    deliveryLustReq:
      name: deliveryLustReq
      description: "Emits the shared '(Req. lust ≥ N)' warning line. Args: threshold
        (number)."
    deliveryAddressFmt:
      name: deliveryAddressFmt
      description: "Formats a passage-name street ('Amethyst Street 42') as a display
        address ('Amethyst Street, 42'). Args: passageName (string)."
    deliveryGenericSuccess:
      name: deliveryGenericSuccess
      description: "Generic successful-delivery block: happy image, thank-you line,
        earnedMoney increment, and the Back button. No args."
    addTime:
      name: addTime
    addLust:
      name: addLust
    gymFitnessGain:
      name: gymFitnessGain
    randomImage:
      name: randomImage
    washClean:
      name: washClean
    removeMakeup:
      name: removeMakeup
    shopCardCorruption:
      name: shopCardCorruption
    shopCard:
      name: shopCard
    consumableCard:
      name: consumableCard
    shopCardConditional:
      name: shopCardConditional
    videoToggle:
      name: videoToggle
    rescueGirlLink:
      name: rescueGirlLink
    breakFreePossession:
      name: breakFreePossession
    salonItem:
      name: salonItem
    salonItemCorruption:
      name: salonItemCorruption
    randomVideoFromList:
      name: randomVideoFromList
    ghostInfoCard:
      name: ghostInfoCard
    searchTool:
      name: searchTool
      description: "Renders a per-room evidence-tool button (EMF, GWB, Spiritbox,
        Ectoplasm, Thermometer, UVL). Builds the meter, repeat loop, event
        chain, and completion replace. Two call forms: (1) <<searchTool tool
        prefix>> — derives the full config from setup.searchToolDefs and
        setup.searchPrefixIndex (this is the form used by <<roomToolCard>>); (2)
        <<searchTool cfgObject>> — pass a fully-built config object for manual
        control of buttonId/meterId/actionSel/etc."
    addLustPussy:
      name: addLustPussy
    addLustByPart:
      name: addLustByPart
    addLustTits:
      name: addLustTits
    addSanity:
      name: addSanity
    addEnergy:
      name: addEnergy
    addFit:
      name: addFit
    deliveryTrackCorrect:
      name: deliveryTrackCorrect
    deliveryTipCheck:
      name: deliveryTipCheck
