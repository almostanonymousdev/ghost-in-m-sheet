sugarcube-2:
  macros:
    video:
      name: video
      description: "Renders a <video> element whose src is resolved against
        setup.ImagePath. First arg is the path (required, e.g.
        'tentacles/2.0.mp4'); .webm picks type=video/webm, otherwise video/mp4.
        Optional second arg: a class-name string, or an options object with any
        of { class, id, width, style, type, autoplay, controls, muted, loop }.
        autoplay/controls/muted/loop default to true; pass false to disable."
    image:
      name: image
      description: "Renders an <img> element whose src is resolved against
        setup.ImagePath. First arg is the path (required, e.g.
        'img/corruption.png'). Optional second arg: a class-name string, or an
        options object with any of { class, id, width, height, style, alt,
        onclick }."
    updatemeter:
      name: updatemeter
      description: "Updates a named meter's value without re-rendering it. If the
        meter is currently on the page it updates in place with animation. Args:
        meterName (string), value (number, 0-1)."
    eventRandomizerText:
      name: eventRandomizerText
      description: "Displays the text and stat changes for the current ghost
        interaction event. Args: eventKey (string, one of 'brain', 'tits',
        'ass', 'bottom', 'mouth', 'pussy', 'anal'). Uses the key to determine
        which body-part dialogue and effects to show."
    companionHelpOption:
      name: companionHelpOption
      description: Renders the companion help button for ghost events. Shows a
        scene-replace link for Brook/Alice/Blake if aroused, or a simple passage
        link for other companions. No args.
    companionExp:
      name: companionExp
      description: "Adds experience points to the active companion ($companion).
        Checks $companion.name and applies the given amount to the matching
        companion object (e.g. $brook.exp). Does nothing if the companion is
        already at max level (5). Args: amount (number)."
    companionLinks:
      name: companionLinks
      description: Renders the active companion's portrait as a clickable link to
        their main hub passage. Uses $companion.name to select the correct image
        and passage.
    companionLinksSuccess:
      name: companionLinksSuccess
      description: Renders the active companion's portrait as a link to the
        'CompanionSucceeded' passage. Uses $companion.name to select the correct
        image.
    companionTextEvent:
      name: companionTextEvent
      description: "Sanity-tier dispatcher for the CompanionEvent passage. Renders
        companion-specific dialog from the catalogue (eventCopy /
        transEventCopy) and applies the standard sanity/lust deltas; tiers 2-4
        also grant +15 MC lust. Trans companions stamp transFirstStage on every
        render. Args: tier (1..4)."
    isCompanionContinue:
      name: isCompanionContinue
      description: 'Renders a linkappend asking whether the companion can continue the
        hunt. Evaluates companion level and sanity against the given thresholds.
        On success may trigger <<include "CompanionResult">> and calls
        <<companionExp 2>>. Args: companionLevel (number), levelThreshold
        (number), sanityMin (number), sanityMax (number).'
    aliceLustHighEvent:
      name: aliceLustHighEvent
      description: "Renders an extra action button shown when Alice's lust is high
        enough. The button reduces $companion.sanity by 3 and replaces
        #eventVideo with <<include \"AliceHelp\">>."
    applyTickEffects:
      name: applyTickEffects
      description: Applies the current tick's stat modifiers to the MC and updates the
        UI for the relevant meters.
    huntTickStep:
      name: huntTickStep
      description: Per-nav-step / per-tool-click chain. Applies per-tick stat
        drains, routes to HuntController.huntOverPassage() on sanity / energy /
        time runout, and otherwise dispatches to <<huntTickEventChain>>.
        Replaces the previous includeTimeEvent* widgets; steal-clothes is gated
        by HuntController.shouldTriggerSteal.
    huntTickEventChain:
      name: huntTickEventChain
      description: Inner per-tick chain run from <<huntTickStep>> and from
        searchToolMarkup's repeat body. Includes LightPassageGhost + Event, then
        conditionally StealClothes (HuntController.shouldTriggerSteal) and
        GhostHuntEvent (HuntController.shouldStartRandomHunt). All branching is
        dispatched via HuntController.
    includeTimeEventClothesHunt:
      name: includeTimeEventClothesHunt
      description: Backwards-compat alias for <<huntTickStep>>; preserved so existing
        call sites in widgetHauntedHouseRoom keep linting clean.
    includeTimeEventHunt:
      name: includeTimeEventHunt
      description: Backwards-compat alias for <<huntTickStep>>; preserved so existing
        ironclad-flavour call sites keep linting clean.
    includeStyle:
      name: includeStyle
      description: Injects a body background-image <style> block for the room in
        previous(), resolving light/dark via setup.Styles. No args.
    includeStyle2:
      name: includeStyle2
      description: Variant of <<includeStyle>> for passages reached via an
        intermediate FurnitureSearch; uses previous(2) as the room. No args.
    includeStyleEventMC:
      name: includeStyleEventMC
      description: "Applies a CSS filter (brightness/contrast/grayscale) to the
        #eventVideo element when coming from a dark room via FurnitureSearch."
    bodyBackground:
      name: bodyBackground
      description: "Emits a <style> block setting body.background-image to the given
        URL, with shared cover/no-repeat/center defaults. Args: url (string)."
    roomBackground:
      name: roomBackground
      description: "Emits a body-background <style> block for a named hunt room,
        resolving the image via setup.Styles.bgUrl (light/dark aware). Silently
        no-ops for unknown rooms. Args: passageName (string)."
    applyRoomLightClass:
      name: applyRoomLightClass
      description: Adds the correct body class for the current passage's room
        ("owaissaKitchenLight" / "…Dark") and removes the opposite variant.
        No-op outside hunt rooms. No args.
    cthulionAbility:
      name: cthulionAbility
      description: "Sets _videoList to the video pool for a specific Cthulion ghost
        ability tier (1-4). Used before rendering the event video for
        Cthulion-specific scenes. Args: tier (number, 1-4)."
    energyGate:
      name: energyGate
      container: true
      description: "Energy-gated link. Renders a grey 'Not enough energy' line when MC
        energy is < 1; otherwise renders a <<link>> to the given passage with
        the given label. The body is the action(s) to run on click. Args:
        passage (string), label (string)."
    seduceGhostMinigameVideo:
      name: seduceGhostMinigameVideo
      description: Renders the media (image or video) for the current seduce-ghost
        minigame state. Delegates video-list lookup to
        setup.SeduceGhostMinigame.getVideoList().
    seduceGhostMinigameMenu:
      name: seduceGhostMinigameMenu
      description: Renders the interactive action buttons for the seduce-ghost
        minigame. Button choices depend on $minigameVideo state and current
        stats. Action logic is delegated to setup.SeduceGhostMinigame.
    seduceGhostMinigameText:
      name: seduceGhostMinigameText
      description: Renders the dialogue and stat feedback text for the current
        seduce-ghost minigame state.
    ghostRoom:
      name: ghostRoom
      description: Prints the human-readable display name of the ghost's current
        favourite room. Maps $ghostRoom.name internal keys (e.g. "bedroomTwo")
        to display strings.
    monkeyPawWish:
      name: monkeyPawWish
      description: "Dispatcher that wikifies the given wish-effect widget by name.
        Used by MonkeyPaw.tw to iterate setup.MonkeyPaw.list() without an
        if/elseif chain. Args: widgetName (string, one of 'activity',
        'trapTheGhost', 'sanity', 'leave', 'knowledge', 'dawn')."
    monkeyPawTail:
      name: monkeyPawTail
      description: "Shared render tail for in-place wish widgets (activity,
        trapTheGhost, sanity): refreshes the lust and sanity meters and renders
        the Return link. No args."
    activity:
      name: activity
      description: Monkey Paw wish view widget. Calls
        setup.MonkeyPaw.activate('activity'), then renders the returned video +
        narrative + stat deltas. Severity scales with wishes-left.
    trapTheGhost:
      name: trapTheGhost
      description: Monkey Paw wish view widget. Calls
        setup.MonkeyPaw.activate('trapTheGhost'), then renders the returned
        narrative + stat deltas. Higher tiers also bait the ghost toward the
        player.
    sanity:
      name: sanity
      description: Monkey Paw wish view widget. Calls
        setup.MonkeyPaw.activate('sanity'), which sets sanity to 50 and (at
        higher tiers) adds lust / banking corruption. Renders deltas.
    leave:
      name: leave
      description: Monkey Paw wish view widget. Calls
        setup.MonkeyPaw.activate('leave') and <<goto>>s the returned street
        passage. Higher tiers drain energy / bank corruption on exit.
    knowledge:
      name: knowledge
      description: Monkey Paw wish view widget. Calls
        setup.MonkeyPaw.activate('knowledge') which removes one unchecked
        evidence and queues a ghost event. One-shot per hunt (renders a 'nothing
        happened' branch on repeat). Higher tiers arrive without the 2-second
        delay and drain sanity.
    dawn:
      name: dawn
      description: Monkey Paw wish view widget. Calls setup.MonkeyPaw.activate('dawn')
        which jumps to 6 AM, ends the cursed hunt, and <<goto>>s HuntOverTime.
        Higher tiers bank corruption.
    tarotPassion:
      name: tarotPassion
      description: "Tarot effect widget dispatched by TarotCards when the passion card
        is drawn: random passion video, +15 lust, -15 sanity."
    tarotPulse:
      name: tarotPulse
      description: "Tarot effect widget dispatched by TarotCards when the pulse card
        is drawn: random pulse video, -15 lust, +15 sanity."
    tarotOblivion:
      name: tarotOblivion
      description: "Tarot effect widget for the oblivion card: routes the player to
        HuntOverSanity after a 2s delay."
    tarotKnowledge:
      name: tarotKnowledge
      description: "Tarot effect widget for the knowledge card: once per hunt, removes
        a random evidence type that isn't already checked or hidden."
    tarotPower:
      name: tarotPower
      description: "Tarot effect widget for the power card: random power video, +5
        energy, +1 fit."
    tarotWhore:
      name: tarotWhore
      description: "Tarot effect widget for the whore card: random whore video, +0.3
        corruption."
    tarotDeath:
      name: tarotDeath
      description: "Tarot effect widget for the death card: triggers the cursed hunt
        flow or, if already opted out, jumps to GhostHuntEvent."
    tarotPossession:
      name: tarotPossession
      description: "Tarot effect widget for the possession card: sets hunt mode to
        POSSESSED, rolls $hours, routes to CityMapPossessed."
    tarotHighpriestess:
      name: tarotHighpriestess
      description: "Tarot effect widget for the high priestess card: sets
        $highpriestess to 1."
    huntEndExit:
      name: huntEndExit
      description: "Shared exit link for HuntEnd hunt-ending scenes. Renders a .usebtn
        link whose destination forks on $highpriestess: when set, the tarot
        burns itself (clears the flag, restores sanity to 25) and routes back to
        $return; otherwise, the link routes to Sleep. Args: linkText (string) --
        e.g. 'fading into darkness', 'plunging you into darkness', 'nothing'."
    webcamEvent:
      name: webcamEvent
      description: Runs the webcam show for the current $webcamEvent type ("tease",
        "masturbate", "toypussy", "toyanal", "fingeranal"). Grants +60 lust and
        money, +0.2 corruption (if below 10), and sets $webcamShowCD to 1.
    showmeter:
      name: showmeter
      description: 'Renders a named meter to the page at the current location.
        Optionally sets its value at the same time. The element receives the id
        "meter-<slugified-name>". Args: meterName (string), [value (number,
        0-1)].'
    hovertip:
      name: hovertip
      container: true
      description: "Container macro that wraps its contents with a tooltip. On hover
        or focus, shows the tooltip text above the element, repositioned
        automatically to stay on-screen. Args: tooltipText (string), [maxWidth
        (number, px)]."
    newmeter:
      name: newmeter
      container: true
      description: "Defines a new named meter. Must be called in StoryInit. Supports
        child tags: <<colors>>, <<sizing>>, <<animation>>, <<label>>. Args:
        meterName (string), [startingValue (number, 0-1)]."
    sizing:
      name: sizing
      description: "Child tag of <<newmeter>>. Sets the meter's dimensions. Args:
        width (CSS value), [height (CSS value)]."
    colors:
      name: colors
      description: "Child tag of <<newmeter>>. Sets the meter's fill, empty, and
        background colors. With 1 arg sets a solid color; with 2 sets
        full+empty; with 3 sets full+empty+backing. Args: full (color), [empty
        (color)], [backing (color)]."
    label:
      name: label
      description: "Child tag of <<newmeter>>. Adds a text label to the meter. Args:
        labelText (string), [textColor (CSS color)], [alignment (string)]."
    animation:
      name: animation
      description: 'Child tag of <<newmeter>>. Configures the fill animation. Pass
        false to disable or a CSS time value (e.g. "0.4s") to set duration.
        Args: timeOrBool (CSS time string | false), [easing ("swing" |
        "linear")].'
    huntConditions:
      name: huntConditions
      description: Renders the hunt HUD row above the tool bar showing the live
        per-step deltas for sanity, lust, corruption (and whether time is
        advancing), plus a coloured badge for every active contributor
        (darkness, clothing state, lust-as-fuel, overcharged tools, bait). Reads
        setup.HauntConditions.snapshot(). No args.
    huntActionBar:
      name: huntActionBar
      description: "Renders the spendable-resource buttons surfaced during a hunt:
        bait the ghost (lust spend), toggle overcharged tools on/off. Only
        renders when a hunt is active (setup.HauntedHouses.isInsideHouse()). No
        args."
    huntEffectsList:
      name: huntEffectsList
      description: Renders the active hunt contributor chips as a vertical list
        (lust thresholds, exhaustion drain, modifier effects, etc.). Reads the
        same setup.HauntConditions.snapshot() that the stats row consumes. No
        args.
    refreshHuntHud:
      name: refreshHuntHud
      description: Refreshes the hunt HUD trio (.hunt-conditions stats,
        .hunt-run-effects chips, .hunt-run-actions buttons) in a single call so
        any state change that affects one keeps the others in sync. No args.
    huntMinimap:
      name: huntMinimap
      description: Renders the active hunt's floor plan as a compact room list
        with spawn / boss / stash annotations. Reads from
        setup.HuntController.minimapData(); emits nothing when no hunt is active. No
        args.
    huntToolBar:
      name: huntToolBar
      description: Renders the six canonical investigation tool slots (EMF, Ectoglass,
        GWB, Spiritbox, Thermometr, UVL) inside the HuntRun toolbar. Pulls
        icons + labels from setup.searchToolDefs in setup.searchToolOrder so the
        hunt's placeholder stays in sync with the tool catalogue.
        Visual-only until the hunt room renderer wires up search bags / meters.
        No args.
    huntLobbyRerollControl:
      name: huntLobbyRerollControl
      description: Renders the lobby's reroll-charge button when the player has at
        least one charge stockpiled, and nothing otherwise. Clicking the button
        consumes a charge, redrafts the run's modifiers, repaints the modifier
        list, and re-invokes itself so the button's visibility and "(you have
        N)" label stay current. No args.
    companionCard:
      name: companionCard
    huntCard:
      name: huntCard
      description: Drops a hunt entry into the GhostStreet flexgrid. Same
        iconPx-sized .housecard style as huntHouseCard. Always routes to
        HuntStart for a fresh haunt -- there is no resume; an in-flight run is
        treated as a failure if the player walks back in. No contract reward, no
        $hauntedHouse activation -- the hunt subsystem owns its own state on
        $run. Arg-less.
    huntHouseCard:
      name: huntHouseCard
      description: "GhostStreet card for a named static-plan hunt house. Renders the
        catalogue entry's image + label, gates on Mc.lvl >= levelGate, and on
        click stages the house id on $pendingHuntHouseId before routing
        to HuntStart -- the lifecycle reads + clears the staging slot and
        forwards staticHouseId to setup.HuntController.startHunt. Args: houseId (string
        from setup.HuntHouses.list(), e.g. 'owaissa')."
    companionStreetTalk:
      name: companionStreetTalk
      description: Renders the '@@.usebtn; [[Talk to her/him|<Name>Main]]' link block
        used by the per-house street passages when the player's companion is
        standing outside. Pulls the Main passage and pronoun from
        setup.Companion.
    randRangeImg:
      name: randRangeImg
      description: "Renders a random image from a numbered sequence. Path is
        setup.ImagePath + '/' + pathPrefix + N + ext, where N is chosen
        uniformly from [start..end]. Args: pathPrefix (string), start (int), end
        (int), ext (string, e.g. '.jpg'), [cssClass (string, default
        'evidenceImgs')]."
    randRangeVideo:
      name: randRangeVideo
      description: "Video counterpart of <<randRangeImg>>. Renders one random video
        from a numbered sequence inside an autoplay/muted/loop shell. Args:
        pathPrefix (string), start (int), end (int), ext (string)."
    notFound:
      name: notFound
      description: "Canonical 'I didn't find anything' block used by the
        evidence-check tool passages. Args: message (string)."
    comicSlider:
      name: comicSlider
      description: "Renders the slide-container that ReadComics steps through. Each
        page's asset is `pathPrefix + 3-digit zero-padded index + '.jpg'`. The
        first slide is marked .active; prev/next anchors hook into the
        showSlides / plusSlides script in ReadComics. Args: pathPrefix (string),
        count (int)."
    coloredText:
      name: coloredText
      description: "Wraps content in the evidence bold/stroke text span. Args: color
        (string — pass '' for no colour), content (any)."
    randomVideo:
      name: randomVideo
    gainXP:
      name: gainXP
    companionMini:
      name: companionMini
    companionExpGain:
      name: companionExpGain
    sanityPills:
      name: sanityPills
    deliveryEventChoose:
      name: deliveryEventChoose
      container: true
      description: "Container widget for a delivery encounter's gate passage. Handles
        init-if-ndef, the header image, earnedMoney accounting (config-driven),
        and the shared 'already delivered → thank you → back' branch. The
        per-encounter dialog goes in the body and is only rendered when the
        encounter hasn't been completed. Args: type (string, key into
        setup.deliveryEventChooseConfig)."
    deliveryVideo:
      name: deliveryVideo
      description: "Renders one random video from /deliveryhub/<subdir>/N.mp4 inside
        an autoplay/muted/loop shell. Args: subdir (string), start (int), [end
        (int, default=start)]."
    deliveryThanks:
      name: deliveryThanks
      description: Emits a randomised 'thank you' one-liner for a successful delivery.
        No args.
    deliverySorry:
      name: deliverySorry
      description: Emits a randomised 'wrong delivery' one-liner. No args.
    deliveryBonus:
      name: deliveryBonus
      description: "Emits the shared 'You earned an extra $N' block that awards bonus
        money and capped corruption. Args: amount (number), [corruption (number,
        default 0.2)]."
    deliveryLustOverflow:
      name: deliveryLustOverflow
      description: Resets $mc.lust to 0 and repaints the lust meter if lust has
        overflowed 100. No args.
    deliveryCorrReq:
      name: deliveryCorrReq
      description: "Emits the shared '(Req. corruption ≥ N)' warning line. Args:
        threshold (number)."
    deliveryLustReq:
      name: deliveryLustReq
      description: "Emits the shared '(Req. lust ≥ N)' warning line. Args: threshold
        (number)."
    deliveryAddressFmt:
      name: deliveryAddressFmt
      description: "Formats a passage-name street ('Amethyst Street 42') as a display
        address ('Amethyst Street, 42'). Args: passageName (string)."
    deliveryGenericSuccess:
      name: deliveryGenericSuccess
      description: "Generic successful-delivery block: happy image, thank-you line,
        earnedMoney increment, and the Back button. No args."
    addTime:
      name: addTime
    addLust:
      name: addLust
    backOrReturn:
      name: backOrReturn
      description: Renders the persistent overlay back button (.backbtn) as either
        <<back>> (when previous() is tagged 'event') or <<return>>. Replaces the
        if/else block that used to be repeated in every GUI overlay (Notebook,
        Phone, Bag, Evidence, ChangeLog). No args.
    gymFitnessGain:
      name: gymFitnessGain
    washClean:
      name: washClean
    wipeMakeup:
      name: wipeMakeup
    shopCardCorruption:
      name: shopCardCorruption
    shopCard:
      name: shopCard
    consumableCard:
      name: consumableCard
    shopCardConditional:
      name: shopCardConditional
    videoToggle:
      name: videoToggle
    rescueGirlLink:
      name: rescueGirlLink
    rescueScene:
      name: rescueScene
      description: "Shared body for the per-girl rescue passages (RescueVictoria,
        RescueNadia, RescueJade, RescueJulia, RescueAsh). Pulls chapter pool +
        end clip from setup.MissingWomen.rescueGirlConfig and runs the
        watch/click/holy-water flow. Args: girlName (string)."
    rescueStay:
      name: rescueStay
      description: "Shared body for the RescueStay branches. Pulls the per-girl 'stay'
        clip set from setup.MissingWomen.rescueStayConfig and renders either the
        two-clip toggle (Victoria/Jade/Julia/Nadia) or the Ash indexed cycle.
        Args: girlName (string)."
    breakFreePossession:
      name: breakFreePossession
    salonItem:
      name: salonItem
    salonItemCorruption:
      name: salonItemCorruption
    randomVideoFromList:
      name: randomVideoFromList
    ghostInfoCard:
      name: ghostInfoCard
    searchTool:
      name: searchTool
      description: "Renders a per-room evidence-tool button (EMF, GWB, Spiritbox,
        Ectoplasm, Thermometer, UVL). Builds the meter, repeat loop, event
        chain, and completion replace. Two call forms: (1) <<searchTool tool
        prefix>> — derives the full config from setup.searchToolDefs and
        setup.searchPrefixIndex (this is the form used by <<roomToolCard>>); (2)
        <<searchTool cfgObject>> — pass a fully-built config object for manual
        control of buttonId/meterId/actionSel/etc."
    toolCheck:
      name: toolCheck
      description: 'Renders a tool check result (EMFcheck, GWBcheck[Art],
        PlasmCheck[Art], SpiritboxCheck, TemperatureHigh, UVLcheck[Art]) via
        setup.ToolController. Args: tool (key into setup.searchToolDefs),
        optional variant ("standard" or "art").'
    deferGoto:
      name: deferGoto
      description: "Schedules Engine.play(targetPassage) on the next event-loop
        tick (setTimeout 0). Used by renderPlasm / renderGwb so their meter-
        completion cleanup finishes synchronously before the navigation -- a
        synchronous <<goto>> would interrupt mid-stream and leave the meter
        stuck full + the cardlink disabled on return. Args: targetPassage
        (string)."
    toolTick:
      name: toolTick
      description: Per-tool-meter-tick widget fired from inside the <<repeat>>
        loop in setup.searchToolMarkup. Burns one in-game minute, refreshes
        the sidebar clock and the tool-timer strip (which linkreplace cannot
        re-render), and routes to setup.HuntController.huntOverPassage("time")
        if the tick pushed the clock past 6 AM during an active hunt. No args.
    disableLinks:
      name: disableLinks
      description: Library widget that disables every link with class
        .linkselector once the surrounding passage finishes rendering
        (<<done>> + addclass disabled-link). Used to lock click targets after
        a one-shot interaction. No args.
    addLustPussy:
      name: addLustPussy
    addLustByPart:
      name: addLustByPart
    addLustTits:
      name: addLustTits
    addSanity:
      name: addSanity
    addEnergy:
      name: addEnergy
    addFit:
      name: addFit
    deliveryTrackCorrect:
      name: deliveryTrackCorrect
    deliveryTipCheck:
      name: deliveryTipCheck
    ghostTypeDropdown:
      name: ghostTypeDropdown
      description: Wraps SugarCube's <<listbox>> UI binding for $ghostTypeSelected, so
        the witch contract passage doesn't need to name the global directly.
    bodyPartRadio:
      name: bodyPartRadio
      description: "Intro form radio bound to $sensualBodyPart.<key>. Args:
        bodyPartKey (string, e.g. 'brain'), label (string)."
    mcNameTextbox:
      name: mcNameTextbox
      description: "Intro form textbox bound to $mc.name. Args: defaultName (string),
        nextPassage (string)."
    evidenceCheckbox:
      name: evidenceCheckbox
      description: "Notebook evidence row checkbox bound to $<key>Check. Args:
        stateKey (string, e.g. 'EMF5Check')."
    monkeyPawWishInput:
      name: monkeyPawWishInput
      description: Textbox bound to $inputWish for the free-form Monkey Paw wish
        field. No args.
    cisCompanionSoloPicker:
      name: cisCompanionSoloPicker
      description: "Shared Info-card body for Brook/Alice/Blake: pick the companion
        for a hunt or send her solo to Owaissa/Elm Street. Args: companionName
        (string, 'Brook'/'Alice'/'Blake'), possessivePronoun (string, e.g.
        'her')."
    huntToolSlot:
      name: huntToolSlot
    statIcon:
      name: statIcon
    mcStatusBody:
      name: mcStatusBody
      description: 'Inner contents of the sidebar #statusContainer (MC clothing HUD).
        Split out of MC.tw so per-slot click handlers in hunt mode can re-render
        the strip via <<replace "#statusContainer">> without rebuilding the
        surrounding container div. No args.'
    mcUndressIcon:
      name: mcUndressIcon
      description: "Sidebar HUD icon for a worn clothing slot. During a hunt the icon
        becomes a click target that takes the garment off and re-renders the
        strip; outside hunts it falls back to the original hovertip + image.
        Args: hunting (bool), slotName (string), hoverText (string), iconFile
        (string, e.g. 'top.jpg')."
    mcRedressIcon:
      name: mcRedressIcon
      description: 'Sidebar HUD icon for a not-worn clothing slot. Mirrors
        mcUndressIcon, but only becomes a link when the slot has a remembered
        last-worn item to put back on. tipText "" suppresses the hovertip
        (preserves the existing tshirt/bottom empty cells). Args: hunting
        (bool), slotName (string), tipText (string), iconFile (string).'
    huntFooterLight:
