name: Bug Report
description: Report something that is broken, incorrect, or not working as expected
title: "[Bug] "
labels: ["bugfix", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.
        If the bug is sensitive in nature, you can describe it without including explicit details.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What is happening? What did you expect to happen instead?
      placeholder: "e.g. When I submit ghost evidence with all 3 correct pieces, the wrong ghost type is shown in the notebook"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Start a ghost hunt
        2. Collect EMF, Freezing Temps, and Spirit Box evidence
        3. Open notebook
        4. Wrong ghost is displayed
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: The notebook should narrow down to the correct ghost based on evidence

  - type: dropdown
    id: version
    attributes:
      label: Game Version
      description: Which version of the game are you playing?
      options:
        - v0.5.1 (latest version)
        - v0.4.8
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area of the Game
      description: Which part of the game does this bug affect?
      options:
        - Ghost Hunting / Evidence System
        - Ghost Behavior / Events
        - Corruption / Lust / Sanity Stats
        - NPC / Companion Behavior
        - Quests / Contracts
        - Economy / Shop
        - UI / Navigation
        - Clothing / Inventory
        - Tarot Cards / Monkey Paw
        - Building / Compilation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us understand the bug? Save file state, browser, etc.
      placeholder: Optional

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      options:
        - label: I searched existing issues and this bug hasn't been reported before
          required: true
